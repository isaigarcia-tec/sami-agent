services:
  - type: web
    name: sami-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: AGENT_NAME
        value: SAMI
      - key: DB_PATH
        value: db/sami.db
    disk:
      name: sami-db
      mountPath: /opt/render/project/src/db
      sizeGB: 1
